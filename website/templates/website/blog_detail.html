{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ post.title }} | LVTD Blog</title>
    <meta name="description" content="{{ post.summary }}" />
    <link rel="stylesheet" href="{% static 'css/app.css' %}" />
    <script defer data-domain="lvtd.dev" src="https://plausible-v2.cr.lvtd.dev/js/script.file-downloads.outbound-links.js"></script>
    <script>
      window.plausible =
        window.plausible ||
        function() {
          (window.plausible.q = window.plausible.q || []).push(arguments)
        }
    </script>
  </head>
  <body class="min-h-screen bg-zinc-950 text-zinc-100 antialiased">
    <div class="site-ambient" aria-hidden="true"></div>
    <div class="fixed inset-0 z-0 flex justify-center sm:px-8">
      <div class="flex w-full max-w-7xl lg:px-8">
        <div class="w-full bg-white ring-1 ring-zinc-100 dark:bg-zinc-900 dark:ring-zinc-300/20"></div>
      </div>
    </div>

    <main class="relative z-20 pb-24">
      <div class="sm:px-8">
        <div class="mx-auto max-w-7xl lg:px-8">
          <div class="relative px-4 sm:px-8 lg:px-12">
            <article class="mx-auto max-w-3xl lg:max-w-4xl">
              <header class="mt-12">
                <a
                  class="inline-flex rounded-full border border-zinc-700 px-4 py-2 text-xs font-semibold text-zinc-200 transition hover:border-zinc-500 hover:bg-zinc-800"
                  href="{% url 'blog-list' %}"
                >
                  ← Back to blog
                </a>
                <p class="mt-8 text-xs font-semibold uppercase tracking-wide text-teal-300">
                  {{ post.published_at|date:"M j, Y" }}
                </p>
                <h1 class="mt-4 text-4xl font-bold tracking-tight text-zinc-100 sm:text-5xl">
                  {{ post.title }}
                </h1>
                <p class="mt-5 text-base leading-7 text-zinc-300">{{ post.summary }}</p>
              </header>

              <section class="mt-10 rounded-2xl border border-zinc-700/40 p-8 text-zinc-200">
                <div class="space-y-4 text-base leading-8">{{ post.body|linebreaks }}</div>
              </section>
            </article>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
