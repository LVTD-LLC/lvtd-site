name: ReviewGate

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: reviewgate-${{ github.workflow }}-${{ github.event.issue.number || github.run_id }}
  cancel-in-progress: true

jobs:
  review:
    if: >-
      ${{
        github.event.issue.pull_request &&
        contains(github.event.comment.body, '@reviewgate review') &&
        github.actor != 'dependabot[bot]'
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Load PR metadata
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail
          pr_json="$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}")"
          head_repo="$(jq -r '.head.repo.full_name' <<< "$pr_json")"

          if [ "$head_repo" != "$GITHUB_REPOSITORY" ]; then
            echo "ReviewGate skipped: comment-triggered reviews only run for in-repository PRs."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          {
            echo "should_run=true"
            echo "number=$PR_NUMBER"
            echo "base_ref=$(jq -r '.base.ref' <<< "$pr_json")"
            echo "head_sha=$(jq -r '.head.sha' <<< "$pr_json")"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: steps.pr.outputs.should_run == 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ steps.pr.outputs.head_sha }}
          fetch-depth: 0

      - name: Fetch base branch
        if: steps.pr.outputs.should_run == 'true'
        run: git fetch origin "${{ steps.pr.outputs.base_ref }}:refs/remotes/origin/${{ steps.pr.outputs.base_ref }}"

      - name: Prepare ReviewGate PR event
        if: steps.pr.outputs.should_run == 'true'
        run: |
          mkdir -p .reviewgate
          jq -n \
            --argjson number "${{ steps.pr.outputs.number }}" \
            --arg sha "${{ steps.pr.outputs.head_sha }}" \
            '{pull_request: {number: $number, head: {sha: $sha}}}' \
            > .reviewgate/pull_request_event.json

      - name: Verify OpenRouter key
        if: steps.pr.outputs.should_run == 'true'
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          if [ -z "$OPENROUTER_API_KEY" ]; then
            echo "::error title=Missing OPENROUTER_API_KEY::Configure this repository secret to enable ReviewGate."
            exit 1
          fi

      - name: Review PR
        if: steps.pr.outputs.should_run == 'true'
        uses: LVTD-LLC/reviewgate@v0
        env:
          GITHUB_BASE_REF: ${{ steps.pr.outputs.base_ref }}
          GITHUB_EVENT_NAME: pull_request
          GITHUB_EVENT_PATH: ${{ github.workspace }}/.reviewgate/pull_request_event.json
        with:
          openrouter_api_key: ${{ secrets.OPENROUTER_API_KEY }}
