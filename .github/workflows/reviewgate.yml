name: ReviewGate

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  # This workflow only runs on pull_request and workflow_dispatch; manual runs use
  # run_id so they do not cancel other manual ReviewGate runs on the same branch.
  group: reviewgate-${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  review:
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          github.event.pull_request.head.repo.full_name == github.repository &&
          github.actor != 'dependabot[bot]'
        )
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Verify OpenRouter key
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          if [ -z "$OPENROUTER_API_KEY" ]; then
            echo "::error title=Missing OPENROUTER_API_KEY::Configure this repository secret to enable ReviewGate."
            exit 1
          fi

      - name: Review PR
        uses: LVTD-LLC/reviewgate@40d73b79d1d620412ab5825eef51746e9fd506e0
        with:
          openrouter_api_key: ${{ secrets.OPENROUTER_API_KEY }}
