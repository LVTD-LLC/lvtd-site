name: deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PROJECT_NAME: lvtd-site

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create CapRover deploy tarball
        run: tar --exclude=deploy.tar -cf deploy.tar .

      - name: CapRover Deploy
        uses: caprover/deploy-from-github@main
        with:
          server: ${{ secrets.CAPROVER_SERVER }}
          app: ${{ env.PROJECT_NAME }}
          token: ${{ secrets.CAPROVER_TOKEN || secrets.APP_TOKEN }}
