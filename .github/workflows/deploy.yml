name: deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  WEB_APP_NAME: lvtd-site
  WORKER_APP_NAME: lvtd-site-workers

jobs:
  deploy-web:
    name: Deploy web app
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create CapRover deploy tarball
        run: tar --exclude=deploy.tar -cf deploy.tar .

      - name: CapRover Deploy (web)
        uses: caprover/deploy-from-github@main
        with:
          server: ${{ secrets.CAPROVER_SERVER }}
          app: ${{ env.WEB_APP_NAME }}
          token: ${{ secrets.CAPROVER_TOKEN_LVTD_SITE }}

  deploy-workers:
    name: Deploy workers app
    runs-on: ubuntu-latest
    needs: deploy-web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create CapRover deploy tarball
        run: tar --exclude=deploy.tar -cf deploy.tar .

      - name: CapRover Deploy (workers)
        uses: caprover/deploy-from-github@main
        with:
          server: ${{ secrets.CAPROVER_SERVER }}
          app: ${{ env.WORKER_APP_NAME }}
          token: ${{ secrets.CAPROVER_TOKEN_LVTD_SITE_WORKERS }}
